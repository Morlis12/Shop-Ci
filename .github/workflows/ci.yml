name: CI Shop_CI

# QUAND ce workflow se déclenche-t-il ?
on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code de la Pull Request
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Installer les dépendances (dbt, duckdb...)
      - name: Installer les dépendances
        run: pip install -r shop_ci_dbt/requirements.txt

      # 4. Créer le profil de connexion
      - name: Configurer le profil dbt
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          shop_ci_dbt:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                threads: 4
          EOF

      # 5. Construire d'abord TOUS les modèles
      - name: dbt run
        working-directory: shop_ci_dbt
        run: dbt run

      # 6. Puis exécuter les tests (données ET unitaires) une fois les tables prêtes
      - name: dbt test
        working-directory: shop_ci_dbt
        run: dbt test

      # 7. Installer les dépendances du graphe
      - name: Installer rdflib
        run: pip install rdflib

      # 8. Générer et classifier le graphe
      - name: Générer le graphe de connaissances
        working-directory: shop_ci_dbt/owl
        run: |
          python 01_schema.py
          python 02_export.py
          python 03_classify.py
