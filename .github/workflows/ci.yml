name: CI Shop_CI

# QUAND ce workflow se déclenche-t-il ?
on:
  pull_request:        # à chaque Pull Request ouverte/mise à jour vers main
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest   # la machine virtuelle prêtée par GitHub

    steps:
      # 1. Récupérer le code de la Pull Request
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installer Python (comme sur ton PC, mais depuis zéro)
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Installer les dépendances (dbt, duckdb...)
      - name: Installer les dépendances
        run: pip install -r shop_ci_dbt/requirements.txt

      # 4. Créer le profil de connexion (voir explication plus bas)
      - name: Configurer le profil dbt
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          shop_ci_dbt:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                threads: 4
          EOF

      # 5. Construire et tester le projet
      - name: dbt build
        working-directory: shop_ci_dbt
        run: dbt build