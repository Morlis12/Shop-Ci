name: CI Shop_CI

# QUAND ce workflow se déclenche-t-il ?
on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code de la Pull Request
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Installer les dépendances
      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # 4. Configurer le profil dbt pour BigQuery
      - name: Configurer le profil dbt
        run: |
          mkdir -p ~/.dbt
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
          cat > ~/.dbt/profiles.yml << EOF
          shop_ci_dbt:
            target: bigquery_dev
            outputs:
              bigquery_dev:
                type: bigquery
                method: service-account
                project: shop-503309
                dataset: shop_ci_dev
                threads: 4
                keyfile: /tmp/gcp-key.json
                location: US
          EOF

      # 5. Construire et tester (full-refresh, snapshots exclus --
      #    contrainte du palier gratuit BigQuery sans carte bancaire, sans DML/MERGE)
      - name: dbt build
        working-directory: shop_ci_dbt
        run: dbt build --target bigquery_dev --full-refresh --no-partial-parse --exclude path:snapshots

      # NOTE : la génération du graphe (owl/) reste temporairement hors CI --
      # elle dépend encore de dev.duckdb en local, non disponible sur cette cible BigQuery.
      # Limitation documentée dans README.md, section 6.