version: 2

unit_tests:

  - name: ut_nettoyage_dates_et_statuts_commandes
    description: "La cascade de dates (macro nettoyer_date) doit parser les 3 familles de formats, renvoyer NULL sur un format inconnu, et le statut doit être normalisé."
    model: stg_commandes
    given:
      - input: source('source_brut', 'commandes')
        format: dict  # Migration vers le format natif dbt agnostique
        rows:
          - {id_commande: "1", id_client: "10", date_commande: "2024-01-25 15:30:00", statut: "livree", canal: "site_web"}
          - {id_commande: "2", id_client: "11", date_commande: "17/05/2023 09:15", statut: "LIVREE", canal: "appli_mobile"}
          - {id_commande: "3", id_client: "12", date_commande: "04-18-2024", statut: "annulee", canal: "whatsapp"}
          - {id_commande: "4", id_client: "13", date_commande: "25 janvier 2024", statut: "expediee", canal: "site_web"}
    expect:
      format: dict
      rows:
        - {id_commande: 1, date_commande: "2024-01-25 15:30:00", statut: "livree"}
        - {id_commande: 2, date_commande: "2023-05-17 09:15:00", statut: "livree"}
        - {id_commande: 3, date_commande: "2024-04-18 00:00:00", statut: "annulee"}
        - {id_commande: 4, date_commande: null, statut: "expediee"}

  - name: ut_flags_doublons_paiements
    description: "Un 2e paiement réussi sur la même commande = doublon. Un réussi après un échoué = légitime (pas doublon)."
    model: stg_paiements
    given:
      - input: source('source_brut', 'paiements')
        format: dict  # Remplacement des "union all" SQL problématiques sur le cloud
        rows:
          - {id_paiement: "1", id_commande: "100", montant: "5000", methode: "mobile_money", statut_paiement: "reussi"}
          - {id_paiement: "2", id_commande: "100", montant: "5000", methode: "mobile_money", statut_paiement: "reussi"}
          - {id_paiement: "3", id_commande: "200", montant: "8000", methode: "carte_bancaire", statut_paiement: "echoue"}
          - {id_paiement: "4", id_commande: "200", montant: "8000", methode: "Mobile Money", statut_paiement: "reussi"}
    expect:
      format: dict
      rows:
        - {id_paiement: 1, est_reussi: 1, est_doublon: 0, methode: "mobile_money"}
        - {id_paiement: 2, est_reussi: 1, est_doublon: 1, methode: "mobile_money"}
        - {id_paiement: 3, est_reussi: 0, est_doublon: 0, methode: "carte_bancaire"}
        - {id_paiement: 4, est_reussi: 1, est_doublon: 0, methode: "mobile_money"}
