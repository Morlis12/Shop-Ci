version: 2

models:

  # =========================================================================
  # DIMENSION : CLIENTS
  # =========================================================================
  - name: dim_clients
    description: "Dimension clients (sans PII), avec membre inconnu id=-1."
    config:
      contract:
        enforced: true
    columns:
      - name: id_client
        data_type: int64
        tests: [unique, not_null]
      - name: nom_complet
        data_type: string
      - name: ville
        data_type: string
      - name: pays
        data_type: string
      - name: date_inscription
        data_type: date

  # =========================================================================
  # DIMENSION : PRODUITS
  # =========================================================================
  - name: dim_produits
    description: "Dimension produits."
    config:
      contract:
        enforced: true
    columns:
      - name: id_produit
        data_type: int64
        tests: [unique, not_null]
      - name: nom_produit
        data_type: string
      - name: categorie
        data_type: string
      - name: prix_unitaire
        data_type: int64
      - name: cout_unitaire
        data_type: int64
      - name: statut
        data_type: string

  # =========================================================================
  # DIMENSION : CALENDRIER
  # =========================================================================
  - name: dim_calendrier
    description: "Dimension calendrier générée, un jour par ligne."
    config:
      contract:
        enforced: true
    time_spine:
      standard_granularity_column: jour
    columns:
      - name: jour
        data_type: date
        granularity: day
        tests: [unique, not_null]
      - name: annee
        data_type: int64
      - name: numero_mois
        data_type: int64
      - name: nom_mois
        data_type: string
      - name: annee_mois
        data_type: string
      - name: numero_jour_semaine
        data_type: int64
      - name: nom_jour
        data_type: string
      - name: est_weekend
        data_type: boolean

  # =========================================================================
  # FAIT : VENTES
  # =========================================================================
  - name: fait_ventes
    description: "Faits ventes. Grain : une ligne de commande."
    config:
      contract:
        enforced: true
    columns:
      - name: id_ligne
        data_type: int64
        tests: [unique, not_null]
      - name: id_commande
        data_type: int64
      - name: id_client
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: id_client
      - name: id_produit
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_produits')
                field: id_produit
      - name: jour_commande
        data_type: date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_calendrier')
                field: jour
      - name: statut
        data_type: string
      - name: canal
        data_type: string
      - name: quantite
        data_type: int64
        tests: [not_null]
      - name: montant_ligne
        data_type: int64
        tests: [not_null]
      - name: cout_ligne
        data_type: int64
      - name: marge_ligne
        data_type: int64
      - name: date_commande_chargement
        data_type: timestamp
        tests: [not_null]

  # =========================================================================
  # FAIT : PAIEMENTS
  # =========================================================================
  - name: fait_paiements
    description: "Faits paiements. Grain : un paiement."
    config:
      contract:
        enforced: true
    columns:
      - name: id_paiement
        data_type: int64
        tests: [unique, not_null]
      - name: id_commande
        data_type: int64
      - name: id_client
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: id_client
      - name: jour_commande
        data_type: date
      - name: canal
        data_type: string
      - name: methode
        data_type: string
      - name: statut_paiement
        data_type: string
      - name: est_reussi
        data_type: int64
        tests:
          - accepted_values:
              values: [0, 1]
              quote: false  # <-- Indique à dbt de traiter les critères comme des nombres
      - name: est_doublon
        data_type: int64
        tests:
          - accepted_values:
              values: [0, 1]
              quote: false  # <-- Indique à dbt de traiter les critères comme des nombres
      - name: vrai_reussi
        data_type: int64
        tests:
          - accepted_values:
              values: [0, 1]
              quote: false  # <-- Indique à dbt de traiter les critères comme des nombres
      - name: montant
        data_type: int64
        tests: [not_null]
      - name: date_commande_chargement
        data_type: timestamp
